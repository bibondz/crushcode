name: CI

on:
  push:
    branches: [main, master, 002-*]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build (Debug)
        run: zig build

      - name: Build (Release)
        run: zig build -Doptimize=ReleaseSmall

      - name: Run shared module tests
        run: |
          zig test src/core/json_helpers.zig
          zig test src/core/string_utils.zig
          zig test src/core/collections.zig
          zig test src/core/process.zig

      - name: Run registry tests
        run: zig build test-registry

      - name: Run protocol tests
        run: zig build test-protocol

      - name: Check formatting
        run: zig fmt --check src/
        continue-on-error: true

      - name: Report binary size
        run: |
          echo "### Binary Sizes" >> $GITHUB_STEP_SUMMARY
          echo "| Build | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Debug | $(du -h zig-out/bin/crushcode | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          zig build -Doptimize=ReleaseSmall
          echo "| ReleaseSmall | $(du -h zig-out/bin/crushcode | cut -f1) |" >> $GITHUB_STEP_SUMMARY
