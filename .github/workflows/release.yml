name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            os: ubuntu-latest
          - target: x86_64-windows-gnu
            os: ubuntu-latest
          - target: aarch64-macos
            os: macos-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        run: zig build -Doptimize=ReleaseSmall -Dtarget=${{ matrix.target }}

      - name: Rename binary
        run: |
          mkdir -p release
          if [ "${{ matrix.target }}" = "x86_64-windows-gnu" ]; then
            cp zig-out/bin/crushcode.exe release/crushcode-${{ matrix.target }}.exe
          else
            cp zig-out/bin/crushcode release/crushcode-${{ matrix.target }}
          fi

      - name: Generate SHA256 checksum
        run: |
          cd release
          if [ "${{ matrix.target }}" = "x86_64-windows-gnu" ]; then
            shasum -a 256 crushcode-${{ matrix.target }}.exe > crushcode-${{ matrix.target }}.exe.sha256
          else
            shasum -a 256 crushcode-${{ matrix.target }} > crushcode-${{ matrix.target }}.sha256
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crushcode-${{ matrix.target }}
          path: release/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**
